#----------- Error Messages -----------
no-balance: "<red>You cannot withdraw negative amount"
insufficient-funds: "<red>Insufficient funds"
deposit-negative: "<red>Cannot deposit negative amount"
args: "<red>Not enough arguments"
player-not-found: "<red>Could not find player"
same-player: "<red>You cannot send money to yourself"

#----------- /bal Command -----------
# %bal% - Balance
# %player% - Player
balance-self: "<green>Your balance is %bal%"
balance-other: "<green>%player%'s Balance is %bal%"


#----------- /eco Command -----------
#%amount% - amount
#%player% - the player
set: "<green>Set %player%'s balance to %amount%"
add: "<green>Added %amount% to %player%'s balance"
take: "<green>Took %amount% from %player%'s balance"

#----------- /pay Command -----------
#%amount% - amount
#%receiver% - receiver
#%sender% - sender

invalid-number: "<red>Invalid number format"
sent: "<green>Successfully transferred %amount% to %receiver%"
received: "<green>Received a payment of %amount% from %sender%"
player-turned-off-payments: "<red>%receiver% has turned off payments"

#----------- /togglePay Command -----------
turned-off: "<green>Successfully <red>turned off <green>payments"
turned-on: "<green>Successfully turned on payments"

#----------- /eco reload -----------
reload: "<green>Configuration reloaded successfully"

#----------- /eco reset -----------
reset: "<green>Reset %player%'s balance to %amount%"
reset-all: "<green>Reset %count% players to %amount%"

#---- Menu Globals----
nextPage-name: "<gold><!italic>Next Page"
previousPage-name: "<gold><!italic>Previous Page"

#----------- Transaction History -----------

guiTitle: "<green>Transaction History"

status-received: "<green><bold><!italic>RECEIVED"
status-sent: "<dark_red><bold><!italic>SENT"

Transaction-name: "<aqua><bold><!italic>TRANSACTION "
Transaction-Lore:
  - "<gray><!italic>- <white><bold>Amount: <aqua><bold>%amount%"
  - "<gray><!italic>- <white><bold>Sender: <aqua><bold>%sender%"
  - "<gray><!italic>- <white><bold>Receiver: <aqua><bold>%receiver%"
  - "<gray><!italic>- <white><bold>Status: <aqua><bold>%status%"
  - "<gray><!italic>- <white><bold>Time: <aqua><bold>%time%"

#----------- BalTop -----------
balTop-Title: "<gold>BalTOP"

head-name: "<white><!italic>%place%. <gold>%player%"
head-lore:
  - ""
  - "<gray><!italic>- <white><bold>Balance: <aqua><bold>%bal%"

#---------- Withdraw Check ----------
check:
    material: PAPER
    displayname: "<green><!italic>Check $"
    lore:
        - "<gray><!italic>To use this check click: <green>RMB"
        - ""
        - "<gray><!italic>Amount: <green>%amount%"
        - "<gray><!italic>Owner: <green>%owner%"
message-received: "<green>Succesfully claimed %amount%"
